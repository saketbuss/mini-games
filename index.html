<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAKET'S SITE // GAME ARCADE</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 40%),
        linear-gradient(180deg, #020617, #0f172a 55%, #020617);
      color: #e2e8f0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .loader-shell {
      width: min(560px, calc(100vw - 32px));
      padding: 28px 24px;
      border-radius: 24px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(15, 23, 42, 0.74);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.5);
    }
    .loader-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(14, 165, 233, 0.14);
      color: #7dd3fc;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h1 {
      margin: 18px 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: 0.12em;
      line-height: 1;
    }
    p {
      margin: 0;
      color: rgba(226, 232, 240, 0.78);
      line-height: 1.7;
      font-size: 14px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(148, 163, 184, 0.14);
      font-size: 13px;
      color: rgba(226, 232, 240, 0.92);
    }
    .pulse {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      animation: pulse 1.7s infinite;
      flex: 0 0 auto;
    }
    .error {
      color: #fca5a5;
      border-top-color: rgba(239, 68, 68, 0.24);
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70% { box-shadow: 0 0 0 16px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
  </style>
</head>
<body>
  <main class="loader-shell">
    <div class="loader-badge">AR.OS Sync</div>
    <h1>Loading Arcade</h1>
    <p id="loader-copy">Pulling the latest game shell and wiring in the new repo builds for Experiments and Games.</p>
    <div id="loader-status" class="status-row">
      <span class="pulse"></span>
      <span>Syncing homepage payload…</span>
    </div>
  </main>
  <script>
    (function () {
      var sourceUrl = 'https://raw.githubusercontent.com/saketbuss/mini-games/b63dfa1e98d22a824d3a9a2a4215567da40e2846/my-website-with-some-games';
      var patchScript = String.raw`<script>
(function () {
  if (window.__saketRepoPatchApplied) return;
  window.__saketRepoPatchApplied = true;

  var GAME_ROOT = 'https://raw.githubusercontent.com/saketbuss/mini-games/main/';

  function rawUrl(path) {
    return GAME_ROOT + path;
  }

  function notify(message, kind) {
    if (typeof window.toast === 'function') {
      window.toast(message, kind === 'err' ? 'err' : 'ok');
    }
  }

  async function openStandaloneGame(title, path) {
    var overlay = document.getElementById('eg-overlay');
    var frame = document.getElementById('eg-frame');
    var titleEl = document.getElementById('eg-title');
    var homeView = document.getElementById('home-view');
    var portsView = document.getElementById('ports-view');

    if (!overlay || !frame) return;

    try {
      if (titleEl) titleEl.textContent = title.toUpperCase();
      notify('Loading ' + title + '...', 'ok');
      var response = await fetch(rawUrl(path));
      if (!response.ok) throw new Error('Unable to load ' + path + ' (' + response.status + ')');
      var html = await response.text();
      frame.removeAttribute('src');
      frame.srcdoc = html;
      overlay.classList.add('show');
      if (homeView) homeView.classList.add('hidden');
      if (portsView) portsView.classList.add('hidden');
    } catch (error) {
      console.error(error);
      notify('Could not load ' + title, 'err');
    }
  }

  function textNodeReplace(from, to) {
    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    var node;
    while ((node = walker.nextNode())) {
      if (node.nodeValue && node.nodeValue.trim() === from) {
        node.nodeValue = node.nodeValue.replace(from, to);
      }
    }
  }

  function patchCounts() {
    textNodeReplace('14 TITLES', '16 TITLES');
    textNodeReplace('TITLES 14', 'TITLES 16');
    textNodeReplace('EXPERIMENTS 6', 'EXPERIMENTS 7');
    textNodeReplace('ACTIVE 6', 'ACTIVE 7');
    textNodeReplace('9 games · Multiplayer · AI Assistant', '11 games · Multiplayer · AI Assistant');
  }

  function findCardByName(selector, name) {
    return Array.from(document.querySelectorAll(selector)).find(function (el) {
      return el.textContent.trim() === name;
    });
  }

  function resetNode(node) {
    var clone = node.cloneNode(true);
    node.replaceWith(clone);
    return clone;
  }

  function wireClicks(root, handler) {
    root.addEventListener('click', handler);
    root.querySelectorAll('button, a').forEach(function (el) {
      el.addEventListener('click', handler);
    });
  }

  function paintGameThumb(thumb, meta) {
    if (!thumb) return;
    thumb.innerHTML = '';
    thumb.style.background = meta.background;

    var glow = document.createElement('div');
    glow.className = 'gc-glow';
    var icon = document.createElement('div');
    icon.textContent = meta.icon;
    icon.style.position = 'relative';
    icon.style.zIndex = '1';
    icon.style.filter = 'drop-shadow(0 0 18px rgba(255,255,255,0.28))';
    var over = document.createElement('div');
    over.className = 'gc-over';
    over.textContent = 'PLAY';

    thumb.appendChild(glow);
    thumb.appendChild(icon);
    thumb.appendChild(over);
  }

  function paintPortThumb(thumb, meta) {
    if (!thumb) return;
    thumb.innerHTML = '';
    thumb.style.background = meta.background;

    var glow = document.createElement('div');
    glow.className = 'port-glow';
    var icon = document.createElement('div');
    icon.textContent = meta.icon;
    icon.style.position = 'relative';
    icon.style.zIndex = '1';
    icon.style.filter = 'drop-shadow(0 0 18px rgba(255,255,255,0.28))';

    thumb.appendChild(glow);
    thumb.appendChild(icon);
  }

  function configureGameCard(card, meta) {
    var fresh = resetNode(card);
    fresh.style.setProperty('--gc-ac', meta.accent);

    var nameEl = fresh.querySelector('.gc-name');
    if (nameEl) nameEl.textContent = meta.name;

    var tags = fresh.querySelectorAll('.gc-tag');
    if (tags[0]) tags[0].textContent = meta.tag;

    var authorEl = fresh.querySelector('.gc-author');
    if (authorEl) authorEl.textContent = meta.detail;

    paintGameThumb(fresh.querySelector('.gc-thumb'), meta);

    var handler = function (event) {
      event.preventDefault();
      event.stopPropagation();
      openStandaloneGame(meta.name, meta.path);
    };

    wireClicks(fresh, handler);
    return fresh;
  }

  function configurePortCard(card, meta) {
    var fresh = resetNode(card);
    fresh.style.setProperty('--pc-ac', meta.accent);

    var nameEl = fresh.querySelector('.port-card-name');
    if (nameEl) nameEl.textContent = meta.name;

    var descEl = fresh.querySelector('.port-card-desc');
    if (descEl) descEl.textContent = meta.description;

    var tagEl = fresh.querySelector('.port-tag');
    if (tagEl) tagEl.textContent = meta.tag;

    paintPortThumb(fresh.querySelector('.port-card-thumb'), meta);

    var button = fresh.querySelector('.port-open-btn');
    if (button) button.textContent = 'OPEN';

    var handler = function (event) {
      event.preventDefault();
      event.stopPropagation();
      openStandaloneGame(meta.name, meta.path);
    };

    wireClicks(fresh, handler);
    return fresh;
  }

  function applyPatch() {
    var gameGrid = document.getElementById('game-grid');
    var portsGrid = document.querySelector('.ports-grid');
    if (!gameGrid || !portsGrid) return false;
    if (gameGrid.dataset.repoPatchReady === '1') return true;

    var gameTemplate = gameGrid.querySelector('.gc');
    var portTemplate = portsGrid.querySelector('.port-card');
    if (!gameTemplate || !portTemplate) return false;

    gameGrid.dataset.repoPatchReady = '1';

    var racingMeta = {
      name: 'Nitro Drift X',
      tag: 'RACING',
      detail: 'AR DRIVE',
      icon: '🏎',
      path: 'racing-game',
      accent: '#38bdf8',
      background: 'linear-gradient(135deg, #0b1120, #0f3b63 50%, #38bdf8)'
    };
    var minecraftMeta = {
      name: 'Minecraft Builder',
      tag: 'SANDBOX',
      detail: 'WORLD BUILD',
      icon: '🧱',
      path: 'minecraft',
      accent: '#22c55e',
      background: 'linear-gradient(135deg, #12220f, #2f6b1a 55%, #9fd14f)'
    };
    var multiplayerMeta = {
      name: 'Glass Tag',
      tag: 'MULTIPLAYER',
      detail: '2-4P',
      icon: '👥',
      path: 'multiplayer-game',
      accent: '#06b6d4',
      background: 'linear-gradient(135deg, #06131d, #0f3252 55%, #22d3ee)'
    };
    var platformerMeta = {
      name: 'Neon Overdrive',
      tag: 'PLATFORM',
      detail: 'ACTION',
      icon: '⚡',
      path: 'platformer-game',
      accent: '#f472b6',
      background: 'linear-gradient(135deg, #1a0620, #5f0f42 52%, #fb7185)'
    };
    var fluidMeta = {
      name: 'Fluid Sensory Playground',
      description: 'Silky particle swirls, palette cycling, audio toggles, and a dense WebGL flow field.',
      tag: 'VISUAL',
      icon: '🫧',
      path: 'fluid-game',
      accent: '#8b5cf6',
      background: 'linear-gradient(135deg, #090914, #1e1b4b 55%, #38bdf8)'
    };

    var nitroName = findCardByName('#game-grid .gc-name', 'Nitro Drift');
    if (nitroName) configureGameCard(nitroName.closest('.gc'), racingMeta);

    var brickName = findCardByName('#game-grid .gc-name', 'Brick Builder');
    if (brickName) configureGameCard(brickName.closest('.gc'), minecraftMeta);

    gameGrid.appendChild(configureGameCard(gameTemplate.cloneNode(true), multiplayerMeta));
    gameGrid.appendChild(configureGameCard(gameTemplate.cloneNode(true), platformerMeta));
    portsGrid.appendChild(configurePortCard(portTemplate.cloneNode(true), fluidMeta));

    patchCounts();
    notify('Arcade synced with fluid, minecraft, multiplayer, platformer, and racing updates.', 'ok');
    return true;
  }

  var attempts = 0;
  function boot() {
    attempts += 1;
    if (applyPatch()) return;
    if (attempts < 40) setTimeout(boot, 250);
  }

  if (document.readyState === 'complete') {
    setTimeout(boot, 150);
  } else {
    window.addEventListener('load', function () {
      setTimeout(boot, 150);
    }, { once: true });
  }
})();
<\/script>`;

      fetch(sourceUrl)
        .then(function (response) {
          if (!response.ok) {
            throw new Error('Failed to fetch source shell (' + response.status + ')');
          }
          return response.text();
        })
        .then(function (html) {
          var patched = html.replace('</body>', patchScript + '\n</body>');
          document.open();
          document.write(patched);
          document.close();
        })
        .catch(function (error) {
          console.error(error);
          var copy = document.getElementById('loader-copy');
          var status = document.getElementById('loader-status');
          if (copy) {
            copy.textContent = 'The arcade shell could not be loaded from GitHub. Refresh once and try again.';
          }
          if (status) {
            status.classList.add('error');
            status.innerHTML = '<span class="pulse" style="background:#ef4444"></span><span>' + error.message + '</span>';
          }
        });
    })();
  </script>
</body>
</html>
